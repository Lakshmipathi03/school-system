<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Select Class</title>

<style>
    body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #89f7fe, #66a6ff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px 40px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 350px;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    label {
        font-weight: 500;
        color: #555;
    }

    select {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
        font-size: 14px;
        background: #f9f9f9;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        background: #66a6ff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #4d8aff;
    }
</style>

</head>

<body>

<div class="container">

    <h2>📘 Select Class</h2>

    <form action="/adi/attendance/edit-by-class" method="get">
        
        <label>Select Class:</label>

        <select name="className">
            <option value="5th">5th</option>
            <option value="6th">6th</option>
            <option value="7th">7th</option>
            <option value="8th">8th</option>
            <option value="9th">9th</option>
            <option value="10th">10th</option>
        </select>

        <button type="submit">✏️ Edit Attendance</button>

    </form>

</div>

</body>
</html>
