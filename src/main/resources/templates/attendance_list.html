<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Attendance Records</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 900px;
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        /* 🏫 School Title */
        .school-name {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .page-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #74ebd5;
            display: inline-block;
            padding-bottom: 5px;
        }

        p {
            color: green;
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px 15px;
            text-align: center;
        }

        th {
            background: #74ebd5;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #e8f8f5;
            transition: 0.3s;
        }

        td {
            color: #333;
            font-size: 15px;
        }

        /* Status */
        .present {
            color: green;
            font-weight: bold;
        }

        .absent {
            color: red;
            font-weight: bold;
        }

        /* Buttons */
        .btn-back {
            background: #74ebd5;
            border: none;
            color: white;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin: 10px 5px;
            transition: 0.3s ease;
        }

        .btn-back:hover {
            background: #5ec2b8;
        }

        footer {
            margin-top: 25px;
            font-size: 13px;
            color: #333;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            th, td {
                font-size: 12px;
                padding: 8px;
            }

            .school-name {
                font-size: 18px;
            }

            .page-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 🏫 School Name -->
    <div class="school-name">Mother Theresa English Medium School</div>

    <!-- 📄 Page Title -->
    <div class="page-title">📄 All Attendance Records</div>

    <p th:text="${message}"></p>

    <table>
        <tr>
            <th>Date</th>
            <th>Student Name</th>
            <th>Class</th>
            <th>Status</th>
        </tr>
        <tr th:each="att : ${attendances}">
            <td th:text="${att.date}"></td>
            <td th:text="${att.student.name}"></td>
            <td th:text="${att.student.className}"></td>
            <td>
                <span th:text="${att.status}"
                      th:classappend="${att.status == 'Present'} ? 'present' : 'absent'"></span>
            </td>
        </tr>
    </table>

    <a href="/adi/attendance/select-class" class="btn-back">🔙 Back to Class Selection</a>
    <a href="/adi/home" class="btn-back">🏠 Back to Home Page</a>
    <a href="/adi/attendance/pdf" class="btn-back">📥 Download PDF</a>

    <footer>© 2025 School Attendance System</footer>
</div>

</body>
</html>
