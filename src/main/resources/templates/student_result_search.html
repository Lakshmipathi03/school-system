<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Result</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg,#74ebd5,#ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 95%;
            max-width: 1200px; /* 🔥 FIXED */
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        /* 🔥 ADD SCROLL */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 1200px; /* 🔥 IMPORTANT */
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        th {
            background: #74ebd5;
            color: #fff;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #e8f8f5;
        }

        /* 🔥 BUTTON STYLE FIX */
        .btn {
            text-decoration: none;
            background: #74ebd5;
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            margin: 2px;
            display: inline-block;
            font-size: 13px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5ec2b8;
        }

        .delete-btn {
            background: #f44336;
        }

        .delete-btn:hover {
            background: #c62828;
        }

        .back-btn {
            margin-top: 20px;
        }

        .back-btn a {
            text-decoration: none;
            background: #74ebd5;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 5px;
            display: inline-block;
        }

        .back-btn a:hover {
            background: #5ec2b8;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Details</h2>

    <div class="table-wrapper">
        <table>
            <tr>
                <th>S.No</th>
                <th>ID</th>
                <th>Name</th>
                <th>Full Name</th>
                <th>Class</th>
                <th>Roll No</th>
                <th>Father</th>
                <th>Mother</th>
                <th>Mobile</th>
                <th>Email</th>
                <th>Address</th>
                <th>Student Aadhar</th>
                <th>Father Aadhar</th>
                
            </tr>

            <tr>
    <td>1</td>
    <td th:text="${student.id}"></td>
    <td th:text="${student.name}"></td>
    <td th:text="${student.fullName}"></td>
    <td th:text="${student.className}"></td>
    <td th:text="${student.rollNumber}"></td>
    <td th:text="${student.fatherName}"></td>
    <td th:text="${student.motherName}"></td>
    <td th:text="${student.mobileNumber}"></td>
    <td th:text="${student.email}"></td>
    <td th:text="${student.address}"></td>
    <td th:text="${student.studentAadhar}"></td>
    <td th:text="${student.fatherAadhar}"></td>
</tr>
        </table>
    </div>

    <div class="back-btn">
        <a href="/adi/searchByRoll">🔙 Back</a>
        <a href="/adi/home">🏠 Home</a>
    </div>
</div>

</body>
</html>
