<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Marks By Class</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #dfe9f3, #ffffff);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-top: 20px;
        }

        form {
            margin-top: 20px;
        }

        select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #45a049;
        }

        table {
            margin: 30px auto;
            border-collapse: collapse;
            width: 90%;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: linear-gradient(to right, #4CAF50, #2e7d32);
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f1f1f1;
            transition: 0.3s;
        }

        a {
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 13px;
            margin: 2px;
            display: inline-block;
        }

        .edit {
            background: #ff9800;
            color: white;
        }

        .edit:hover {
            background: #e68900;
        }

        .delete {
            background: #f44336;
            color: white;
        }

        .delete:hover {
            background: #c62828;
        }

    </style>
</head>

<body>

<h2>Select Class</h2>

<form action="/marks/view-by-class" method="get">
    <label for="className">Select Class:</label>

    <select name="className" id="className" required>
        <option value="">--Select Class--</option>
        <option value="5th">Class 5</option>
        <option value="6th">Class 6</option>
        <option value="7th">Class 7</option>
        <option value="8th">Class 8</option>
        <option value="9th">Class 9</option>
        <option value="10th">Class 10</option>
    </select>

    <button type="submit">View</button>
</form>

<br><br>

<div th:if="${marksList != null}">

    <h2 th:text="'Marks List - ' + ${className}"></h2>

    <table>
        <tr>
            <th>Student Name</th>
            <th>English</th>
            <th>Sanskrit</th>
            <th>Maths</th>
            <th>Science</th>
            <th>Chemistry</th>
            <th>Social</th>
            <th>Total</th>
            <th>Action</th>
        </tr>

        <tr th:each="m : ${marksList}">
            <td th:text="${m.student.name}"></td>
            <td th:text="${m.english}"></td>
            <td th:text="${m.sanskrit}"></td>
            <td th:text="${m.mathas}"></td>
            <td th:text="${m.science}"></td>
            <td th:text="${m.chemistry}"></td>
            <td th:text="${m.social}"></td>
            <td th:text="${m.totalMarks}"></td>

            <td>
                <a th:href="@{'/marks/edit/' + ${m.id}}" class="edit">Edit</a>
                <a th:href="@{'/marks/delete/' + ${m.id}}" 
                   onclick="return confirm('Are you sure?')" 
                   class="delete">Delete</a>
            </td>
        </tr>

    </table>
</div>

</body>
</html>
