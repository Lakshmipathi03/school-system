<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.2);
            width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #74ebd5;
            display: inline-block;
            padding-bottom: 5px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 20px;
        }

        label {
            font-weight: bold;
            color: #444;
            margin-bottom: 5px;
            display: block;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #74ebd5;
            box-shadow: 0 0 6px rgba(116, 235, 213, 0.6);
            outline: none;
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            background-color: #74ebd5;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            grid-column: span 2;
        }

        button:hover {
            background-color: #5ec2b8;
        }

        .footer {
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>

<body>
<div class="container">
    <h2>Add New Student</h2>

    <form th:action="@{/adi/student}" method="post" th:object="${student}">

        <div class="form-group">
            <label>Name:</label>
            <input type="text" th:field="*{name}" required>
        </div>

        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" th:field="*{fullName}" required>
        </div>

        <div class="form-group">
            <label>Father Name:</label>
            <input type="text" th:field="*{fatherName}" required>
        </div>

        <div class="form-group">
            <label>Mother Name:</label>
            <input type="text" th:field="*{motherName}" required>
        </div>

        <div class="form-group">
            <label>Mobile Number:</label>
            <input type="text"
       th:field="*{mobileNumber}"
       pattern="[0-9]{10}"
       maxlength="10"
       title="Mobile number must be exactly 10 digits only"
       required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email"
       th:field="*{email}"
       pattern="[a-z0-9._%+-]+@gmail\.com"
       title="Email must be lowercase and end with @gmail.com">
        </div>

        <div class="form-group full-width">
            <label>Address:</label>
            <input type="text" th:field="*{address}">
        </div>

        <div class="form-group">
    <label>Student Aadhar:</label>
    <input type="text"
           th:field="*{studentAadhar}"
           pattern="[0-9]{12}"
           maxlength="12"
           required>

    <!-- ✅ ERROR MESSAGE -->
    <span style="color:red"
          th:if="${#fields.hasErrors('studentAadhar')}"
          th:errors="*{studentAadhar}">
    </span>
</div>

        <div class="form-group">
            <label>Father Aadhar:</label>
            <input type="text"
       th:field="*{fatherAadhar}"
       pattern="[0-9]{12}"
       maxlength="12"
       title="Aadhar must be exactly 12 digits">
        </div>

        <div class="form-group full-width">
            <label>Class Name:</label>
            <select th:field="*{className}" required>
                <option value="">-- Select Class --</option>
                <option value="5th">5</option>
                <option value="6th">6</option>
                <option value="7th">7</option>
                <option value="8th">8</option>
                <option value="9th">9</option>
                <option value="10th">10</option>
            </select>
        </div>

        <button type="submit">Submit</button>
    </form>
    <div th:if="${error}" style="color:red; text-align:center; font-weight:bold;">
    <p th:text="${error}"></p>
</div>

    <div class="footer">
        © 2025 Mother Theresa English Medium School
    </div>
</div>
</body>
</html>
