<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students By Class</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg,#74ebd5,#ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 95%;
            max-width: 1200px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 1200px;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        th {
            background: #74ebd5;
            color: #fff;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #e8f8f5;
        }

        .btn {
            text-decoration: none;
            background: #74ebd5;
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            margin: 3px;
            display: inline-block;
            transition: 0.3s;
            font-size: 13px;
        }

        .btn:hover {
            background: #5ec2b8;
        }

        .delete-btn {
            background: #f44336;
        }

        .delete-btn:hover {
            background: #c62828;
        }
    </style>
</head>

<body>

<div class="container">
    <h2 th:text="'Students List - ' + ${className}"></h2>

    <div class="table-wrapper">
        <table>
            <tr>
                <th>S.No</th>
                <th>ID</th>
                <th>Name</th>
                <th>Full Name</th>
                <th>Class</th>
                <th>Roll No</th>
                <th>Father</th>
                <th>Mother</th>
                <th>Mobile</th>
                <th>Email</th>
                <th>Address</th>
                <th>Student Aadhar</th>
                <th>Father Aadhar</th>
                <th>Action</th>
            </tr>

            <tr th:each="student, stat : ${students}">
                <td th:text="${stat.count}"></td>
                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.fullName}"></td>
                <td th:text="${student.className}"></td>
                <td th:text="${student.rollNumber}"></td>
                <td th:text="${student.fatherName}"></td>
                <td th:text="${student.motherName}"></td>
                <td th:text="${student.mobileNumber}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.address}"></td>
                <td th:text="${student.studentAadhar}"></td>
                <td th:text="${student.fatherAadhar}"></td>

                <td>
                    <a th:href="@{'/adi/edit/' + ${student.id}}" class="btn">✏ Edit</a>

                    <a th:href="@{'/adi/delete/' + ${student.id}}"
                       onclick="return confirm('Are you sure you want to delete?')"
                       class="btn delete-btn">🗑 Delete</a>
                </td>
            </tr>
        </table>
    </div>

    <a href="/adi/home" class="btn">🏠 Back to Home</a>
</div>

</body>
</html>
