<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students By Class</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f9;
        }

        table {
            margin: 30px auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background: #4CAF50;
            color: white;
        }

        a {
            padding: 6px 10px;
            text-decoration: none;
            border-radius: 5px;
            color: white;
        }

        .edit {
            background: orange;
        }

        .delete {
            background: red;
        }

        .delete:hover {
            background: darkred;
        }

        .edit:hover {
            background: darkorange;
        }
    </style>
</head>

<body>

<h2 th:text="'Students List - ' + ${className}"></h2>

<table>
    <tr>
        <th>Roll Number</th>
        <th>Name</th>
        <th>Class</th>
        <th>Action</th>
    </tr>

    <tr th:each="student : ${students}">
        <td th:text="${student.rollNumber}"></td>
        <td th:text="${student.name}"></td>
        <td th:text="${student.className}"></td>

        <td>
            <a th:href="@{'/adi/edit/' + ${student.id}}" class="edit">Edit</a>
            <a th:href="@{'/adi/delete/' + ${student.id}}"
               onclick="return confirm('Are you sure you want to delete?')"
               class="delete">Delete</a>
        </td>
    </tr>

</table>

</body>
</html>
