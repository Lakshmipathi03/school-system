<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Students List</title>

<style>
body{
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* Container */
.container{
    background:#fff;
    padding:30px 40px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    width:90%;
    max-width:900px;
    text-align:center;
    animation: fadeIn 0.6s ease-in-out;
}

/* Titles */
.school-name{
    font-size:22px;
    font-weight:bold;
    color:#333;
    margin-bottom:5px;
}

h2{
    color:#333;
    margin-bottom:20px;
    border-bottom:3px solid #74ebd5;
    display:inline-block;
    padding-bottom:5px;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    padding:12px;
    text-align:center;
}

th{
    background:#74ebd5;
    color:white;
    text-transform:uppercase;
}

tr:nth-child(even){
    background:#f9f9f9;
}

tr:hover{
    background:#e8f8f5;
}

/* Button */
button{
    background:#74ebd5;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5ec2b8;
}

/* Animation */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Responsive */
@media(max-width:600px){
    .container{
        padding:20px;
    }

    th,td{
        font-size:12px;
        padding:8px;
    }

    .school-name{
        font-size:18px;
    }
}
</style>

</head>

<body>

<div class="container">

    <!-- School Name -->
    <div class="school-name">Mother Theresa English Medium School</div>

    <!-- Page Title -->
    <h2 th:text="'Students of ' + ${className}"></h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Action</th>
        </tr>

        <tr th:each="student : ${students}">
            <td th:text="${student.id}"></td>
            <td th:text="${student.name}"></td>
            <td th:text="${student.className}"></td>

            <td>
                <a th:href="@{/adi/attendance/edit/{id}(id=${student.id})}">
                    <button>✏ Edit</button>
                </a>
            </td>
        </tr>
    </table>

</div>

</body>
</html>
