<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Students List</title>
</head>

<body>

<h2 th:text="'Students of ' + ${className}"></h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Class</th>
<th>Action</th>
</tr>

<tr th:each="student : ${students}">

<td th:text="${student.id}"></td>
<td th:text="${student.name}"></td>
<td th:text="${student.className}"></td>

<td>

<a th:href="@{/adi/attendance/edit/{id}(id=${student.id})}">
<button>Edit</button>
</a>

</td>

</tr>

</table>

</body>
</html>
