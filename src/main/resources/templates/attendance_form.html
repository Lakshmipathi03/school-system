<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mark Attendance</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px 15px;
            text-align: center;
        }

        th {
            background: #66a6ff;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #e8f8f5;
            transition: 0.3s;
        }

        select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            background: #f8f9fa;
        }

        button {
            background: #66a6ff;
            border: none;
            color: #fff;
            font-size: 16px;
            padding: 12px 25px;
            margin-top: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #4d8aff;
        }

        .back-link {
            margin-top: 15px;
            display: inline-block;
            color: #333;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #66a6ff;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Attendance for <span th:text="${className}"></span></h2>

    <form th:action="@{/adi/attendance/save}" method="post">
        <input type="hidden" name="className" th:value="${className}" />

        <table>
            <tr>
                <th>Student ID</th>
                <th>Name</th>
                <th>Status</th>
            </tr>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td>
                    <input type="hidden" name="studentId" th:value="${student.id}" />
                    <select name="status">
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                    </select>
                </td>
            </tr>
        </table>

        <button type="submit">✅ Save Attendance</button>
    </form>

    <a th:href="@{/adi/attendances}" class="back-link">📄 View All Attendance Records</a>
</div>

</body>
</html>
