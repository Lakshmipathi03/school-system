<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Select Class</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 400px;
        }

        h2 {
            color: #333;
            font-size: 26px;
            margin-bottom: 25px;
            border-bottom: 3px solid #ff9a9e;
            display: inline-block;
            padding-bottom: 5px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        label {
            font-weight: bold;
            color: #444;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        select:focus {
            border-color: #ff9a9e;
            box-shadow: 0 0 8px rgba(255, 154, 158, 0.6);
            outline: none;
        }

        button {
            background-color: #ff9a9e;
            color: #fff;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
            width: 100%;
        }

        button:hover {
            background-color: #f97b8b;
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }

        @media (max-width: 600px) {
            .container {
                width: 90%;
                padding: 30px;
            }
            h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Select Class to Enter Marks</h2>

        <form th:action="@{/marks/students}" method="get">
            <label for="className">Select Class:</label>
            <select name="className" id="className" required>
                <option value="">--Select Class--</option>
                <option value="5th">Class 5</option>
                <option value="6th">Class 6</option>
                <option value="7th">Class 7</option>
                <option value="8th">Class 8</option>
                <option value="9th">Class 9</option>
                <option value="10th">Class 10</option>
            </select>

            <button type="submit">Next</button>
        </form>

        <div class="footer">
            © 2025 School Management System
        </div>
    </div>
</body>
</html>
