<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students List</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg,#74ebd5,#ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 95%;
            max-width: 1200px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        /* 🔥 Scroll for many columns */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 1200px;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        th {
            background: #74ebd5;
            color: #fff;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #e8f8f5;
        }

        .btn {
            text-decoration: none;
            background: #74ebd5;
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            margin: 10px 5px;
            display: inline-block;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5ec2b8;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>All Students</h2>
    <p th:text="${message}"></p>

    <div class="table-wrapper">
        <table>
            <tr>
                <th>S.No</th>
                <th>ID</th>
                <th>Name</th>
                <th>Full Name</th>
                <th>Class</th>
                <th>Roll No</th>
                <th>Father</th>
                <th>Mother</th>
                <th>Mobile</th>
                <th>Email</th>
                <th>Address</th>
                <th>Student Aadhar</th>
                <th>Father Aadhar</th>
            </tr>

            <tr th:each="s, stat : ${students}">
                <td th:text="${stat.count}"></td>
                <td th:text="${s.id}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.fullName}"></td>
                <td th:text="${s.className}"></td>
                <td th:text="${s.rollNumber}"></td>
                <td th:text="${s.fatherName}"></td>
                <td th:text="${s.motherName}"></td>
                <td th:text="${s.mobileNumber}"></td>
                <td th:text="${s.email}"></td>
                <td th:text="${s.address}"></td>
                <td th:text="${s.studentAadhar}"></td>
                <td th:text="${s.fatherAadhar}"></td>
            </tr>
        </table>
    </div>

    <a href="/adi/attendances" class="btn">📄 View Attendance Records</a>
    <a href="/adi/home" class="btn">🏠 Back to Home Page</a>
</div>

</body>
</html>
