<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students List</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg,#74ebd5,#ACB6E5);
            display:flex; justify-content:center; align-items:center;
            flex-direction:column; min-height:100vh; margin:0;
        }
        .container {
            background:#fff; padding:30px 40px;
            border-radius:15px; box-shadow:0 8px 20px rgba(0,0,0,0.2);
            width:90%; max-width:1000px; text-align:center;
        }
        h2 { color:#333; margin-bottom:10px; }
        table {
            width:100%; border-collapse:collapse;
            border-radius:10px; overflow:hidden;
        }
        th,td { padding:12px 15px; text-align:center; }
        th { background:#66a6ff; color:#fff; font-weight:bold; }
        tr:nth-child(even){ background:#f9f9f9; }
        tr:hover { background:#e8f8f5; transition:0.3s; }
        a {
            text-decoration:none; background:#66a6ff; color:#fff;
            padding:10px 15px; border-radius:8px; margin-top:15px;
            display:inline-block;
        }
        a:hover { background:#5ec2b8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>All Students</h2>
        <p th:text="${message}"></p>

        <table border="1">
            <tr>
    <th>S.No</th>
    <th>ID</th>
    <th>Name</th>
    <th>Class</th>
    <th>Roll Number</th>
</tr>

<tr th:each="s, stat : ${students}">
    <td th:text="${stat.count}"></td> <!-- ✅ Serial Number -->
    <td th:text="${s.id}"></td>
    <td th:text="${s.name}"></td>
    <td th:text="${s.className}"></td>
    <td th:text="${s.rollNumber}"></td>
</tr>
        </table>

        <a href="/adi/attendances">📄 View All Attendance Records</a>
        <a href="/adi/home"> Back to Home Page </a>
    </div>
</body>
</html>
