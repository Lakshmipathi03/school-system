<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #36d1dc, #5b86e5);
    margin: 0;
    padding: 0;
}

.container {
    width: 600px;
    margin: 80px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    color: #333;
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #5b86e5;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

tr:hover {
    background: #f5f7ff;
}

.pay-btn {
    text-decoration: none;
    padding: 6px 12px;
    background: #36d1dc;
    color: white;
    border-radius: 5px;
    transition: 0.3s;
}

.pay-btn:hover {
    background: #2bb3c0;
}
</style>
</head>

<body>

<div class="container">

<h2>🎓 Student Details</h2>

<table>
<tr>
    <th>Name</th>
    <th>Class</th>
    <th>Roll Number</th>
    <th>Action</th>
</tr>

<tr>
    <td th:text="${student.name}"></td>
    <td th:text="${student.className}"></td>
    <td th:text="${student.rollNumber}"></td>
    <td>
        <a th:href="@{'/adi/fees/pay/' + ${student.rollNumber}}" class="pay-btn">
            💳 Pay
        </a>
    </td>
</tr>

</table>

</div>

</body>
</html>
