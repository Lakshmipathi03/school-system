<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Enter Marks</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5); /* MATCHED */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            width: 450px;
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        /* School Name */
        .school-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 26px;
            border-bottom: 3px solid #74ebd5; /* MATCHED */
            display: inline-block;
            padding-bottom: 5px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        label {
            font-weight: bold;
            color: #444;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input[type="number"], select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, select:focus {
            border-color: #74ebd5;
            box-shadow: 0 0 8px rgba(116, 235, 213, 0.6);
            outline: none;
        }

        button {
            background-color: #74ebd5; /* MATCHED */
            color: #fff;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background-color: #5ec2b8; /* MATCHED */
        }

        a {
            display: inline-block;
            text-decoration: none;
            background-color: #74ebd5;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            margin-top: 20px;
            transition: 0.3s;
        }

        a:hover {
            background-color: #5ec2b8;
        }

        .footer {
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                width: 90%;
                padding: 25px 30px;
            }
            h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- School Name -->
        <div class="school-name">Mother Theresa English Medium School</div>

        <h2 th:text="'Enter Marks for Class ' + ${className}">Enter Marks</h2>

        <form th:action="@{/marks/save}" method="post" th:object="${marks}">
            
            <label for="studentId">Select Student:</label>
            <select name="studentId" id="studentId" required>
                <option value="">--Select Student--</option>
                <option th:each="student : ${students}"
                        th:value="${student.id}"
                        th:text="${student.name} + ' (' + ${student.rollNumber} + ')'">
                </option>
            </select>

            <label>English:</label>
            <input type="number" name="english" min="0" max="100" required>

            <label>Sanskrit:</label>
            <input type="number" name="sanskrit" min="0" max="100" required>

            <label>Maths:</label>
            <input type="number" name="mathas" min="0" max="100" required>

            <label>Science:</label>
            <input type="number" name="science" min="0" max="100" required>

            <label>Chemistry:</label>
            <input type="number" name="chemistry" min="0" max="100" required>

            <label>Social:</label>
            <input type="number" name="social" min="0" max="100" required>

            <button type="submit">✅ Save Marks</button>
        </form>

        <div class="footer">
            © 2025 School Management System
        </div>
    </div>
</body>
</html>
