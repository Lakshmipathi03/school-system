<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Select Class</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            margin-bottom: 25px;
            color: #2c3e50;
            border-bottom: 3px solid #74ebd5;
            display: inline-block;
            padding-bottom: 5px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            font-size: 15px;
            transition: 0.3s;
        }

        select:focus {
            border-color: #74ebd5;
            outline: none;
            box-shadow: 0 0 8px rgba(116, 235, 213, 0.6);
        }

        button {
            width: 100%;
            padding: 10px;
            background: #74ebd5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #5ec2b8;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>📚 Select Class</h2>

    <form action="/adi/studentsByClass" method="get">
        <select name="className" required>
            <option value="">-- Select Class --</option>
            <option value="5th">5</option>
            <option value="6th">6</option>
            <option value="7th">7</option>
            <option value="8th">8</option>
            <option value="9th">9</option>
            <option value="10th">10</option>
        </select>

        <button type="submit">View Students</button>
    </form>

    <div class="footer">
        © 2025 School Management System
    </div>

</div>

</body>
</html>
