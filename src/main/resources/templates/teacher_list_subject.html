<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>View Teachers by Subject</title>

<style>
    body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg,#74ebd5,#ACB6E5);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        background: #fff;
        padding: 35px 45px;
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        width: 380px;
        text-align: center;
        animation: fadeIn 0.5s ease-in-out;
    }

    h3 {
        color: #2c3e50;
        margin-bottom: 20px;
        border-bottom: 3px solid #66a6ff;
        display: inline-block;
        padding-bottom: 5px;
    }

    select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-top: 10px;
        font-size: 14px;
        transition: 0.3s;
    }

    select:focus {
        border-color: #66a6ff;
        box-shadow: 0 0 8px rgba(102,166,255,0.5);
        outline: none;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        background: #66a6ff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #5ec2b8;
        transform: scale(1.03);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

</head>

<body>

<div class="container">

<h3>View Teachers by Subject</h3>

<form action="/adi/teachers-by-subject" method="get">

<select name="subject" required>

<option value="">Select Subject</option>
<option value="Math">Math</option>
<option value="Science">Science</option>
<option value="English">English</option>
<option value="Physics">Physics</option>

</select>

<button type="submit">View</button>

</form>

</div>

</body>
</html>
