<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Attendance</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #c3cfe2, #c3e0e5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        p {
            font-size: 15px;
            margin: 10px 0;
            color: #555;
        }

        span {
            font-weight: bold;
            color: #222;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 500;
            color: #555;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #f9f9f9;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #6a11cb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4a0ca3;
        }
    </style>

</head>
<body>

<div class="container">

    <h2>✏️ Edit Attendance</h2>

    <form th:action="@{/adi/attendance/update/{id}(id=${attendance.id})}" method="post">

        <p>Student Name: <span th:text="${attendance.student.name}"></span></p>
        <p>Class: <span th:text="${attendance.student.className}"></span></p>

        <label>Status:</label>
        <select name="status">
            <option value="Present" th:selected="${attendance.status == 'Present'}">Present</option>
            <option value="Absent" th:selected="${attendance.status == 'Absent'}">Absent</option>
        </select>

        <button type="submit">✅ Update Attendance</button>

    </form>

</div>

</body>
</html>
