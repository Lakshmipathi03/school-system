<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Attendance</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5); /* MATCHED */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 35px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        /* School Name */
        .school-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        /* Title */
        h2 {
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #74ebd5;
            display: inline-block;
            padding-bottom: 5px;
        }

        p {
            font-size: 15px;
            margin: 10px 0;
            color: #555;
            text-align: left;
        }

        span {
            font-weight: bold;
            color: #222;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 500;
            color: #555;
            text-align: left;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #f9f9f9;
            font-size: 14px;
        }

        select:focus {
            border-color: #74ebd5;
            box-shadow: 0 0 6px rgba(116, 235, 213, 0.6);
            outline: none;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #74ebd5; /* MATCHED */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5ec2b8; /* MATCHED */
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container {
                width: 90%;
                padding: 25px;
            }
        }
    </style>

</head>
<body>

<div class="container">

    <!-- School Name -->
    <div class="school-name">Mother Theresa English Medium School</div>

    <!-- Title -->
    <h2>✏️ Edit Attendance</h2>

    <form th:action="@{/adi/attendance/update/{id}(id=${attendance.id})}" method="post">

        <p>Student Name: <span th:text="${attendance.student.name}"></span></p>
        <p>Class: <span th:text="${attendance.student.className}"></span></p>

        <label>Status:</label>
        <select name="status">
            <option value="Present" th:selected="${attendance.status == 'Present'}">Present</option>
            <option value="Absent" th:selected="${attendance.status == 'Absent'}">Absent</option>
        </select>

        <button type="submit">✅ Update Attendance</button>

    </form>

</div>

</body>
</html>
