<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Marks</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 400px;
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4CAF50;
            outline: none;
            box-shadow: 0 0 5px #4CAF50;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>

<body>

<div class="container">

    <h2>✏️ Edit Marks</h2>

    <form th:action="@{'/marks/update/' + ${marks.id}}" method="post">

        <label>English</label>
        <input type="number" name="english" th:value="${marks.english}" min="0" max="100">

        <label>Sanskrit</label>
        <input type="number" name="sanskrit" th:value="${marks.sanskrit}" min="0" max="100">

        <label>Maths</label>
        <input type="number" name="mathas" th:value="${marks.mathas}" min="0" max="100">

        <label>Science</label>
        <input type="number" name="science" th:value="${marks.science}" min="0" max="100">

        <label>Chemistry</label>
        <input type="number" name="chemistry" th:value="${marks.chemistry}" min="0" max="100">

        <label>Social</label>
        <input type="number" name="social" th:value="${marks.social}" min="0" max="100">

        <button type="submit">Update Marks</button>

    </form>

</div>

</body>
</html>
