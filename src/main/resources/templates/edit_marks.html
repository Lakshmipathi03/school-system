<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Marks</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5); /* MATCHED */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 35px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        /* School Name */
        .school-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        /* Title */
        h2 {
            margin-bottom: 25px;
            color: #333;
            border-bottom: 3px solid #74ebd5;
            display: inline-block;
            padding-bottom: 5px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            text-align: left;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus {
            border-color: #74ebd5;
            outline: none;
            box-shadow: 0 0 6px rgba(116, 235, 213, 0.6);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #74ebd5; /* MATCHED */
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5ec2b8; /* MATCHED */
            transform: scale(1.03);
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container {
                width: 90%;
                padding: 25px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <!-- School Name -->
    <div class="school-name">Mother Theresa English Medium School</div>

    <!-- Title -->
    <h2>✏️ Edit Marks</h2>

    <form th:action="@{'/marks/update/' + ${marks.id}}" method="post">

        <label>English</label>
        <input type="number" name="english" th:value="${marks.english}" min="0" max="100">

        <label>Sanskrit</label>
        <input type="number" name="sanskrit" th:value="${marks.sanskrit}" min="0" max="100">

        <label>Maths</label>
        <input type="number" name="mathas" th:value="${marks.mathas}" min="0" max="100">

        <label>Science</label>
        <input type="number" name="science" th:value="${marks.science}" min="0" max="100">

        <label>Chemistry</label>
        <input type="number" name="chemistry" th:value="${marks.chemistry}" min="0" max="100">

        <label>Social</label>
        <input type="number" name="social" th:value="${marks.social}" min="0" max="100">

        <button type="submit">✅ Update Marks</button>

    </form>

</div>

</body>
</html>
