<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Student</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5); /* SAME THEME */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 400px;
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            color: #333;
            font-size: 26px;
            margin-bottom: 25px;
            border-bottom: 3px solid #74ebd5; /* MATCHED */
            display: inline-block;
            padding-bottom: 5px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        label {
            font-weight: bold;
            color: #444;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border-color: #74ebd5;
            box-shadow: 0 0 8px rgba(116, 235, 213, 0.6);
            outline: none;
        }

        button {
            background-color: #74ebd5; /* MATCHED */
            color: #fff;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
            width: 100%;
        }

        button:hover {
            background-color: #5ec2b8; /* MATCHED */
        }

        .error {
            color: red;
            margin-top: 10px;
            font-weight: bold;
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                width: 90%;
                padding: 30px;
            }

            h2 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🔍 Search Student</h2>

    <form action="/adi/searchByRollResult" method="get">
        <label>Enter Roll Number:</label>
        <input type="number" name="rollNumber" placeholder="Enter roll number" required>
        <button type="submit">Search</button>
    </form>

    <p th:if="${error}" th:text="${error}" class="error"></p>

    <div class="footer">
        © 2025 School Management System
    </div>
</div>

</body>
</html>
