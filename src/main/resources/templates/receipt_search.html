<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Receipt</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5); /* SAME THEME */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #74ebd5; /* MATCHED */
            display: inline-block;
            padding-bottom: 5px;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #74ebd5;
            outline: none;
            box-shadow: 0 0 8px rgba(116, 235, 213, 0.6);
        }

        button {
            width: 95%;
            padding: 12px;
            background: #74ebd5; /* MATCHED */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5ec2b8; /* MATCHED */
        }

        .error {
            color: red;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="icon">🧾</div>
    <h2>Search Receipt</h2>

    <form action="/adi/fees/receipt/view">
        <input type="text" name="receiptNumber" placeholder="Enter Receipt Number" required>
        <button type="submit">Search</button>
    </form>

    <p class="error" th:text="${error}"></p>
</div>

</body>
</html>
