<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Total Students</title>

    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #333;
        }

        .count {
            font-size: 40px;
            color: #ff6b81;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Total Students in School</h2>
    <div class="count" th:text="${totalStudents}"></div>
</div>

</body>
</html>
