<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Total Students</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg,#74ebd5,#ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: #fff;
            padding: 45px 60px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            border-bottom: 3px solid #66a6ff;
            display: inline-block;
            padding-bottom: 5px;
        }

        .count {
            font-size: 50px;
            font-weight: bold;
            color: #66a6ff;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Total Students in School</h2>
    <div class="count" th:text="${totalStudents}"></div>
</div>

</body>
</html>
