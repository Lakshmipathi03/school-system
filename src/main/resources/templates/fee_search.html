<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5); /* MATCHED */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    width: 350px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    text-align: center;
    animation: fadeIn 0.6s ease-in-out;
}

/* School Name */
.school-name {
    font-size: 18px;
    font-weight: bold;
    color: #333;
    margin-bottom: 5px;
}

/* Title */
h2 {
    color: #333;
    margin-bottom: 20px;
    border-bottom: 3px solid #74ebd5;
    display: inline-block;
    padding-bottom: 5px;
}

/* Input */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0 20px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    border-color: #74ebd5;
    outline: none;
    box-shadow: 0 0 6px rgba(116, 235, 213, 0.6);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #74ebd5;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5ec2b8;
}

/* Error */
.error {
    color: red;
    margin-top: 10px;
    font-weight: bold;
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- School Name -->
    <div class="school-name">Mother Theresa English Medium School</div>

    <h2>🔍 Search Student</h2>

    <form action="/adi/fees/searchResult">
        <input type="number" name="rollNumber" placeholder="Enter Roll Number" required>
        <button type="submit">Search</button>
    </form>

    <p th:text="${error}" class="error"></p>

</div>

</body>
</html>
