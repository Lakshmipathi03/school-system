<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #667eea, #764ba2);
    margin: 0;
    padding: 0;
}

.container {
    width: 350px;
    margin: 100px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    color: #333;
    margin-bottom: 20px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0 20px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus {
    border-color: #667eea;
    outline: none;
}

button {
    width: 95%;
    padding: 10px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}

.error {
    color: red;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🔍 Search Student</h2>

<form action="/adi/fees/searchResult">
    <input type="number" name="rollNumber" placeholder="Enter Roll Number" required>
    <button type="submit">Search</button>
</form>

<p th:text="${error}" class="error"></p>

</div>

</body>
</html>
