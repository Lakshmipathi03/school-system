<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Teacher</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg,#74ebd5,#ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            width: 420px;
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 3px solid #66a6ff;
            display: inline-block;
            padding-bottom: 5px;
        }

        form {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label {
            font-weight: 600;
            margin-top: 10px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus {
            border-color: #66a6ff;
            box-shadow: 0 0 8px rgba(102,166,255,0.5);
            outline: none;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #66a6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5ec2b8;
            transform: scale(1.03);
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #66a6ff;
            font-weight: 600;
        }

        a:hover {
            color: #5ec2b8;
        }

        .footer {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Add New Teacher</h2>

    <form th:action="@{/adi/teacher}" method="post" th:object="${teacher}">
        <label>Name</label>
        <input type="text" th:field="*{name}" required>

        <label>Subject</label>
        <input type="text" th:field="*{subject}" required>

        <label>Email</label>
        <input type="email" th:field="*{email}" required>

        <label>Password</label>
        <input type="password" th:field="*{password}" required>

        <button type="submit">Submit</button>
    </form>

    <a href="/adi/teachers">View All Teachers</a>

    <div class="footer">
        © 2025 School Management System
    </div>
</div>

</body>
</html>
