<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; background: #eef2f3; display: flex; height: 100vh; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 10px rgba(0,0,0,0.2); width: 300px; }
        input, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; }
        button:hover { background: #0056b3; }
        .error { color: red; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>School Login</h2>
   <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
        <a href="/forgot-password" 
       style="display:block;text-align:right;margin-top:8px;font-size:14px;">
    </a>
        <p th:if="${error}" th:text="${error}" class="error"></p>
    </form>
</div>
</body>
</html>
