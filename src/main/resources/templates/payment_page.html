<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 420px;
    background: white;
    padding: 30px 35px;
    border-radius: 15px;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease-in-out;
}

.school-name {
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: #333;
    margin-bottom: 5px;
}

h2 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
    border-bottom: 3px solid #74ebd5;
    display: inline-block;
    padding-bottom: 5px;
}

.info {
    background: #e8f8f5;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
    font-size: 14px;
}

label {
    font-weight: 600;
    color: #444;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input:focus, select:focus {
    border-color: #74ebd5;
    outline: none;
    box-shadow: 0 0 6px rgba(116, 235, 213, 0.6);
}

button {
    width: 100%;
    padding: 12px;
    background: #74ebd5;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5ec2b8;
}

#upiBox {
    text-align: center;
    background: #f9f9f9;
    padding: 15px;
    border-radius: 10px;
    display: none;
    margin-top: 10px;
}

.qr-container {
    display: flex;
    justify-content: center;
    padding: 10px;
}

.qr-container img {
    width: 200px;
    height: 200px;
    border-radius: 10px;
    border: 2px solid #ddd;
    padding: 8px;
    background: white;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

@media (max-width: 500px) {
    .container {
        width: 90%;
        padding: 25px;
    }
}
</style>

<script>
// ✅ Keep only ONE function
function toggleUPI() {
    let mode = document.getElementById("mode").value;
    document.getElementById("upiBox").style.display =
        (mode === "UPI") ? "block" : "none";
}

// ✅ AUTO-FILL LOGIC
window.onload = function () {
    let balanceElement = document.getElementById("balanceValue");

    if (balanceElement) {
        let balance = parseFloat(balanceElement.value);
        let amountField = document.getElementById("amountField");

        if (balance < 1000) {
            amountField.value = balance;
            amountField.readOnly = true;
        } else {
            amountField.min = 1000;
        }
    }
};
</script>
</head>

<body>

<div class="container">

    <div class="school-name">Mother Theresa English Medium School</div>

    <h2>💳 Payment Page</h2>

    <div class="info">
        Name: <span th:text="${fee.studentName}"></span><br>
        Class: <span th:text="${fee.className}"></span>
    </div>

    <form action="/adi/fees/processPayment" method="post" th:object="${fee}">

        <input type="hidden" th:field="*{studentName}">
        <input type="hidden" th:field="*{className}">
        <input type="hidden" th:field="*{rollNumber}">

        <!-- ✅ IMPORTANT (Added) -->
        <input type="hidden" id="balanceValue" th:value="${balance}">

        <label>Amount</label>
        <input type="number"
               th:field="*{amount}"
               id="amountField"
               min="0"
               th:attr="max=${balance}"
               required>

        <!-- Optional message -->
        <p th:if="${balance < 1000}" style="color:red; font-weight:bold;">
            ⚠ Remaining balance is ₹<span th:text="${balance}"></span>. Please pay full amount.
        </p>

        <label>Payment Mode</label>
        <select id="mode" th:field="*{paymentMode}" onchange="toggleUPI()">
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
        </select>

        <div id="upiBox">
            <h3>📱 Scan QR</h3>

            <div class="qr-container">
                <img src="/images/QR2.png" alt="QR Code">
            </div>

            <label>Transaction ID</label>
            <input type="text" th:field="*{transactionId}">
        </div>

        <button type="submit">💰 Pay Now</button>

    </form>

</div>

</body>
</html>
