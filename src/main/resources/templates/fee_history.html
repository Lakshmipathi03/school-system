<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fee History</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5); /* MATCHED */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 850px;
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        /* School Name */
        .school-name {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        h2 {
            text-align: center;
            color: #333;
            border-bottom: 3px solid #74ebd5;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        h3 {
            color: #444;
            margin-top: 20px;
        }

        p {
            color: #555;
            margin: 5px 0;
        }

        hr {
            border: 0;
            height: 1px;
            background: #ddd;
            margin: 15px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #74ebd5; /* MATCHED */
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #e8f8f5;
        }

        button {
            background: #74ebd5;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        button:hover {
            background: #5ec2b8;
        }

        a {
            text-decoration: none;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container {
                width: 95%;
                padding: 25px;
            }

            th, td {
                font-size: 12px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- School Name -->
    <div class="school-name">Mother Theresa English Medium School</div>

    <h2>📄 Fee History</h2>

    <p><b>Name:</b> <span th:text="${student.name}"></span></p>
    <p><b>Class:</b> <span th:text="${student.className}"></span></p>
    <p><b>Roll No:</b> <span th:text="${student.rollNumber}"></span></p>

    <hr>

    <h3>💰 Summary</h3>
    <p>Total Fee: ₹ <span th:text="${totalFee}"></span></p>
    <p>Paid: ₹ <span th:text="${paid}"></span></p>
    <p>Balance: ₹ <span th:text="${balance}"></span></p>

    <hr>

    <h3>🧾 Payment Records</h3>

    <table>
        <tr>
            <th>Receipt No</th>
            <th>Amount</th>
            <th>Payment Date</th>
            <th>Status</th>
        </tr>

        <tr th:each="f : ${feeList}">
            <td th:text="${f.receiptNumber}"></td>
            <td>₹ <span th:text="${f.amount}"></span></td>
            <td th:text="${f.paymentDate}"></td>
            <td th:text="${f.status}"></td>
        </tr>

        <tr th:if="${#lists.isEmpty(feeList)}">
            <td colspan="4">No payments done yet</td>
        </tr>
    </table>

    <!-- Pay Button -->
    <div style="text-align:center;">
        <a th:href="@{'/adi/fees/pay/' + ${student.rollNumber}}">
            <button>💳 Proceed to Pay</button>
        </a>
    </div>

</div>

</body>
</html>
