<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Attendance</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5); /* MATCHED */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container */
        .container {
            width: 90%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        /* School Name */
        .school-name {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        /* Title */
        h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #74ebd5;
            display: inline-block;
            padding-bottom: 5px;
        }

        .class-name {
            color: #74ebd5; /* MATCHED */
            font-weight: bold;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #74ebd5; /* MATCHED */
            color: white;
            padding: 12px;
            text-align: center;
        }

        td {
            padding: 10px;
            text-align: center;
            color: #333;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #e8f8f5;
        }

        /* Button */
        button {
            padding: 8px 14px;
            background: #74ebd5; /* MATCHED */
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5ec2b8; /* MATCHED */
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            th, td {
                font-size: 12px;
                padding: 8px;
            }

            .school-name {
                font-size: 18px;
            }
        }
    </style>

</head>
<body>

<div class="container">

    <!-- School Name -->
    <div class="school-name">Mother Theresa English Medium School</div>

    <!-- Title -->
    <h2>
        📋 Edit Attendance for Class 
        <span class="class-name" th:text="${className}"></span>
    </h2>

    <table>

        <tr>
            <th>Student Name</th>
            <th>Class</th>
            <th>Status</th>
            <th>Date</th>
            <th>Action</th>
        </tr>

        <tr th:each="att : ${attendances}">
            <td th:text="${att.student.name}"></td>
            <td th:text="${att.student.className}"></td>
            <td th:text="${att.status}"></td>
            <td th:text="${att.date}"></td>

            <td>
                <a th:href="@{/adi/attendance/edit/{id}(id=${att.id})}">
                    <button>✏️ Edit</button>
                </a>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
